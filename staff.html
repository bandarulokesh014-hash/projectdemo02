<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Staff Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  overflow: hidden;
}

/* Background Animated Circles */
.bg-circles {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  z-index: -1;
}
.bg-circles li {
  position: absolute;
  display: block;
  list-style: none;
  width: 20px;
  height: 20px;
  background: rgba(255, 255, 255, 0.1);
  animation: animate 25s linear infinite;
  bottom: -150px;
  border-radius: 50%;
}
.bg-circles li:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
.bg-circles li:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
.bg-circles li:nth-child(3) { left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
.bg-circles li:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
.bg-circles li:nth-child(5) { left: 65%; width: 20px; height: 20px; animation-delay: 0s; }

@keyframes animate {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 0; }
  100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 50%; }
}

.card {
  width: 400px;
  padding: 45px;
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(25px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
  color: #fff;
  animation: slideUp 0.8s ease;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

.card h1 {
  text-align: center;
  margin-bottom: 30px;
  font-size: 28px;
  font-weight: 600;
  letter-spacing: 1px;
}

.input-box {
  margin-bottom: 25px;
  position: relative;
}

.input-box input {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.3);
  background: rgba(255, 255, 255, 0.05);
  color: white;
  outline: none;
  font-size: 15px;
  transition: all 0.3s ease;
}

.input-box input::placeholder {
  color: rgba(255, 255, 255, 0.6);
}

.input-box input:focus {
  border-color: #00c6ff;
  background: rgba(255, 255, 255, 0.1);
  box-shadow: 0 0 10px rgba(0, 198, 255, 0.3);
}

.btn {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #0b62a4, #00c6ff);
  color: white;
  cursor: pointer;
  font-weight: bold;
  font-size: 16px;
  letter-spacing: 1px;
  transition: all 0.4s ease;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
}

.btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
}

.btn:active {
  transform: translateY(1px);
}

.message {
  text-align: center;
  margin-top: 20px;
  min-height: 20px;
  font-size: 14px;
  font-weight: 500;
}

.back-link {
  display: block;
  text-align: center;
  margin-top: 25px;
  color: rgba(255, 255, 255, 0.7);
  text-decoration: none;
  font-size: 13px;
  transition: 0.3s;
}

.back-link:hover {
  color: white;
  text-decoration: underline;
}
</style>
</head>

<body>

<ul class="bg-circles">
  <li></li><li></li><li></li><li></li><li></li>
</ul>

<div class="card">
  <h1>Staff Login</h1>

  <div class="input-box">
    <input type="text" id="staffId" placeholder="Staff ID">
  </div>

  <div class="input-box">
    <input type="password" id="password" placeholder="Password">
  </div>

  <button class="btn" onclick="loginStaff()">Authenticate</button>

  <div class="message" id="msg"></div>

  <a href="login.html" class="back-link">Return to Role Selection</a>
</div>

<script>
function loginStaff() {
  const staffId = document.getElementById("staffId").value.trim();
  const password = document.getElementById("password").value.trim();
  const msg = document.getElementById("msg");

  msg.innerText = "";

  // Simple validation
  if (staffId === "" || password === "") {
    msg.style.color = "#ff6b6b";
    msg.innerText = "Please enter both Staff ID and Password.";
    return;
  }

  // Pre-defined Staff Credentials
  const validStaff = [
    { id: "staff01", password: "password123", name: "Staff Member 1" },
    { id: "admin", password: "admin123", name: "Administrator" }
  ];

  const staff = validStaff.find(s => s.id === staffId && s.password === password);

  if (staff) {
    msg.style.color = "#51cf66";
    msg.innerText = "✔ Authentication Successful";
    
    // Store staff details
    localStorage.setItem("staffData", JSON.stringify({ id: staff.id, name: staff.name, role: "staff" }));

    setTimeout(() => {
      window.location.href = "staffdashboard.html";
    }, 1200);

  } else {
    msg.style.color = "#ff6b6b";
    msg.innerText = "✖ Invalid Staff ID or Password";
  }
}
</script>

</body>
</html>
