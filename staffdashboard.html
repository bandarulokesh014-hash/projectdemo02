<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Staff Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
<style>
:root {
  --primary: #0b62a4;
  --secondary: #00c6ff;
  --bg-color: #f1f5f9;
  --sidebar-bg: #1e293b;
  --text-dark: #334155;
  --text-light: #f8fafc;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
  background-color: var(--bg-color);
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* Sidebar */
.sidebar {
  width: 260px;
  background: var(--sidebar-bg);
  color: var(--text-light);
  display: flex;
  flex-direction: column;
  transition: 0.3s;
}

.sidebar-header {
  padding: 25px 20px;
  font-size: 22px;
  font-weight: bold;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  gap: 10px;
}

.sidebar-header i {
  color: var(--secondary);
  font-size: 28px;
}

.nav-links {
  list-style: none;
  padding: 20px 0;
  flex-grow: 1;
}

.nav-links li {
  padding: 15px 25px;
  display: flex;
  align-items: center;
  gap: 15px;
  cursor: pointer;
  transition: 0.3s;
  font-size: 16px;
}

.nav-links li:hover, .nav-links li.active {
  background: rgba(255,255,255,0.1);
  border-left: 4px solid var(--secondary);
}

.nav-links li i {
  font-size: 20px;
}

.logout-btn {
  padding: 20px;
  border-top: 1px solid rgba(255,255,255,0.1);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 15px;
  color: #fca5a5;
  transition: 0.3s;
}

.logout-btn:hover {
  background: rgba(255, 255, 255, 0.05);
  color: #ef4444;
}

/* Main Content */
.main-content {
  flex-grow: 1;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

/* Topbar */
.topbar {
  background: white;
  padding: 20px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
}

.topbar-title {
  font-size: 20px;
  font-weight: 600;
  color: var(--text-dark);
}

.user-profile {
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--text-dark);
  font-weight: 500;
}

.user-profile img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--primary);
}

/* Dashboard Cards */
.dashboard-cards {
  padding: 30px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 25px;
}

.stat-card {
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
  display: flex;
  align-items: center;
  gap: 20px;
  border-left: 5px solid var(--primary);
  transition: transform 0.3s;
  cursor: pointer;
}

.stat-card:hover {
  transform: translateY(-5px);
}

.stat-icon {
  width: 60px;
  height: 60px;
  border-radius: 12px;
  background: rgba(11, 98, 164, 0.1);
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 28px;
  color: var(--primary);
}

.stat-info h3 {
  font-size: 26px;
  color: var(--text-dark);
  margin-bottom: 5px;
}

.stat-info p {
  color: #64748b;
  font-size: 14px;
  font-weight: 500;
}

/* Welcome Section */
.welcome-banner {
  margin: 30px 30px 0 30px;
  padding: 30px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  border-radius: 12px;
  color: white;
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
  position: relative;
  overflow: hidden;
}

.welcome-banner h2 {
  font-size: 28px;
  margin-bottom: 10px;
  position: relative;
  z-index: 2;
}

.welcome-banner p {
  font-size: 16px;
  opacity: 0.9;
  position: relative;
  z-index: 2;
}

.welcome-banner::after {
  content: '';
  position: absolute;
  top: -50px;
  right: -50px;
  width: 200px;
  height: 200px;
  background: rgba(255,255,255,0.1);
  border-radius: 50%;
  z-index: 1;
}

@media(max-width: 768px) {
  .sidebar {
    position: absolute;
    left: -260px;
    height: 100%;
    z-index: 10;
  }
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <i class='bx bxs-institution'></i>
    <span>SPMS Admin</span>
  </div>
  
  <ul class="nav-links">
    <li class="active"><i class='bx bxs-dashboard'></i> Dashboard</li>
    <li><i class='bx bxs-user-detail'></i> Manage Students</li>
    <li><i class='bx bxs-spreadsheet'></i> Attendance</li>
    <li><i class='bx bx-wallet'></i> Fee Records</li>
  </ul>

  <div class="logout-btn" onclick="logout()">
    <i class='bx bx-log-out'></i>
    <span>Logout</span>
  </div>
</div>

<div class="main-content">
  <div class="topbar">
    <div class="topbar-title">Staff Portal Overview</div>
    <div class="user-profile">
      <span>Welcome, Staff</span>
      <img src="https://ui-avatars.com/api/?name=Staff&background=0b62a4&color=fff" alt="Profile">
    </div>
  </div>

  <div class="welcome-banner">
    <h2>Welcome to the Staff Dashboard</h2>
    <p>Manage student records, track attendance, and overview fee statuses effortlessly.</p>
  </div>

  <div class="dashboard-cards">
    <div class="stat-card">
      <div class="stat-icon"><i class='bx bxs-group'></i></div>
      <div class="stat-info">
        <h3>1,254</h3>
        <p>Total Students</p>
      </div>
    </div>
    
    <div class="stat-card">
      <div class="stat-icon"><i class='bx bxs-check-circle'></i></div>
      <div class="stat-info">
        <h3>89%</h3>
        <p>Avg Attendance</p>
      </div>
    </div>
    
    <div class="stat-card">
      <div class="stat-icon"><i class='bx bx-money'></i></div>
      <div class="stat-info">
        <h3>54</h3>
        <p>Pending Fees</p>
      </div>
    </div>
  </div>
</div>

<script>
  function logout() {
    localStorage.removeItem("staffData");
    window.location.href = "login.html";
  }
</script>

</body>
</html>
