<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.card{
  width:380px;
  padding:35px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(20px);
  box-shadow:0 25px 50px rgba(0,0,0,0.4);
  color:#fff;
}

.card h1{
  text-align:center;
  margin-bottom:25px;
}

.input-box{
  margin-bottom:20px;
}

.input-box input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
}

.btn{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#3b82f6;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

.btn:hover{
  background:#2563eb;
}

.message{
  text-align:center;
  margin-top:15px;
  min-height:20px;
}
</style>
</head>

<body>

<div class="card">
  <h1>Student Login</h1>

  <div class="input-box">
    <input type="text" id="username" placeholder="Username">
  </div>

  <div class="input-box">
    <input type="text" id="uid" placeholder="UID">
  </div>

  <button class="btn" onclick="login()">Login</button>

  <div class="message" id="msg"></div>
</div>

<script>
function login() {

  const username = document.getElementById("username").value.trim().toLowerCase();
  const uid = document.getElementById("uid").value.trim();
  const msg = document.getElementById("msg");

  msg.innerText = "";

  // Student database (10 students demo)
  const students = [
    { name: "lokesh", uid: "501", fee: 15000, attendance: "85%" },
    { name: "", uid: "502", fee: 20000, attendance: "90%" },
    { name: "", uid: "503", fee: 18000, attendance: "88%" },
    { name: "", uid: "504", fee: 22000, attendance: "92%" },
    { name: "", uid: "505", fee: 17000, attendance: "80%" },
    { name: "", uid: "506", fee: 21000, attendance: "87%" },
    { name: "", uid: "507", fee: 16000, attendance: "75%" },
    { name: "", uid: "508", fee: 23000, attendance: "95%" },
    { name: "", uid: "509", fee: 19000, attendance: "89%" },
    { name: "", uid: "510", fee: 17500, attendance: "83%" }
  ];

  // Validation
  if (username === "" && uid === "") {
    msg.style.color = "#ef4444";
    msg.innerText = "Please enter Username and UID";
    return;
  }

  if (username === "") {
    msg.style.color = "#ef4444";
    msg.innerText = "Username is required";
    return;
  }

  if (uid === "") {
    msg.style.color = "#ef4444";
    msg.innerText = "UID is required";
    return;
  }

  // Check student
  const student = students.find(
    s => s.name === username && s.uid === uid
  );

  if (student) {
    msg.style.color = "#22c55e";
    msg.innerText = "✔ Login Successful";

    localStorage.setItem("studentData", JSON.stringify(student));

    setTimeout(() => {
      window.location.href = "studentdashboard.html";
    }, 1000);

  } else {
    msg.style.color = "#ef4444";
    msg.innerText = "✖ Invalid Username or UID";
  }
}
</script>

</body>
</html>
