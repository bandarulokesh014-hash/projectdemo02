<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Attendance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  margin:0;
  background:linear-gradient(135deg,#ecfeff,#f8fafc);
}

/* Header */
.header{
  background:linear-gradient(135deg,#0ea5e9,#0369a1);
  color:white;
  padding:25px;
  text-align:center;
}

/* Container */
.container{
  max-width:900px;
  margin:40px auto;
  padding:30px;
}

/* Cards */
.cards{
  display:flex;
  gap:20px;
  margin-bottom:30px;
  flex-wrap:wrap;
}

.card{
  flex:1;
  min-width:250px;
  background:white;
  padding:20px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.card h3{
  color:#0369a1;
}

/* Percentage Circle */
.circle{
  width:160px;
  height:160px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:20px auto;
  transition:0.5s ease;
}

.inner{
  width:120px;
  height:120px;
  background:white;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  font-weight:bold;
}

/* Status */
.status{
  font-weight:bold;
  margin-top:10px;
}

/* Back */
.back{
  text-decoration:none;
  color:#0ea5e9;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
  <h1>Attendance Report</h1>
  <p>Track your class attendance</p>
</div>

<div class="container">

  <div class="cards">
    <div class="card">
      <h3>Total Classes</h3>
      <p id="totalClasses" style="font-size:28px;"></p>
    </div>

    <div class="card">
      <h3>Classes Attended</h3>
      <p id="attendedClasses" style="font-size:28px;"></p>
    </div>
  </div>

  <div class="card">
    <h3>Attendance Percentage</h3>

    <div class="circle" id="progressCircle">
      <div class="inner" id="percentageText">0%</div>
    </div>

    <p class="status" id="statusText"></p>
  </div>

  <br>
  <a href="studentdashboard.html" class="back">⬅ Back to Dashboard</a>

</div>

<script>

/* ✅ SESSION CHECK */
fetch('/session')
  .then(res => res.json())
  .then(data => {
    if (!data.loggedIn) {
      window.location.href = 'login.html';
    }
  });

/* ✅ FETCH ATTENDANCE DATA */
fetch('/attendance-data')
  .then(res => res.json())
  .then(data => {

    const total = data.totalClasses;
    const attended = data.attendedClasses;

    const percentage = ((attended / total) * 100).toFixed(1);

    document.getElementById("totalClasses").innerText = total;
    document.getElementById("attendedClasses").innerText = attended;
    document.getElementById("percentageText").innerText = percentage + "%";

    const circle = document.getElementById("progressCircle");
    const statusText = document.getElementById("statusText");

    let color;
    let status;

    if (percentage >= 75) {
      color = "#22c55e";
      status = "Good Attendance 👍";
    } 
    else if (percentage >= 50) {
      color = "#f59e0b";
      status = "Average Attendance ⚠";
    } 
    else {
      color = "#ef4444";
      status = "Low Attendance ❌";
    }

    circle.style.background =
      `conic-gradient(${color} ${percentage}%, #e5e7eb ${percentage}% 100%)`;

    document.getElementById("percentageText").style.color = color;
    statusText.innerText = status;
    statusText.style.color = color;

  });

</script>

</body>
</html>
