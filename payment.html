<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>College Fee Payment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- Icons -->
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

<style>
  :root {
    --primary: #2563eb;
    --bg-color: #f8fafc;
    --card-bg: #ffffff;
    --text-main: #1e293b;
    --text-muted: #64748b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }

  body {
    background-color: var(--bg-color);
    color: var(--text-main);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    padding: 20px;
    background: white;
    box-shadow: 0 4px 15px rgba(0,0,0,0.03);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .back-btn {
    text-decoration: none;
    color: var(--text-main);
    font-size: 24px;
    margin-right: 15px;
    display: flex;
    align-items: center;
  }

  .header h1 { font-size: 18px; font-weight: 600; }

  .content { padding: 20px; flex: 1; display: flex; flex-direction: column; }

  /* Summary Card */
  .due-card {
    background: linear-gradient(135deg, #1e293b, #0f172a);
    color: white;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 15px 30px rgba(15,23,42,0.2);
    margin-bottom: 25px;
    position: relative;
    overflow: hidden;
  }

  .due-card::after {
    content: ''; position: absolute; top: -50%; right: -20%;
    width: 200px; height: 200px; border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }

  .due-card .label { font-size: 14px; font-weight: 300; opacity: 0.8; margin-bottom: 8px; }
  .due-card .amount { font-size: 36px; font-weight: 700; display: flex; align-items: center; gap: 5px; }

  /* Payment Form */
  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; color: var(--text-muted); }
  
  .input-wrapper { position: relative; }
  .input-wrapper i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 20px;}
  
  .form-control {
    width: 100%;
    padding: 16px 16px 16px 45px;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    font-size: 16px;
    background: white;
    outline: none;
    transition: 0.2s;
    font-family: 'Outfit', sans-serif;
  }

  .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37,99,235,0.1); }

  select.form-control { appearance: none; padding-left: 45px; }
  .select-arrow { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }

  /* Submit Button */
  .pay-btn {
    background: var(--primary);
    color: white;
    border: none;
    padding: 18px;
    border-radius: 16px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: auto;
    box-shadow: 0 10px 25px rgba(37,99,235,0.3);
    transition: 0.2s;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
  }

  .pay-btn:active { transform: scale(0.98); }

  /* Success Modal */
  .success-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
    display: flex; justify-content: center; align-items: center; z-index: 100;
    opacity: 0; visibility: hidden; transition: 0.3s;
  }
  
  .success-overlay.active { opacity: 1; visibility: visible; }

  .success-modal {
    background: white; padding: 40px 30px; border-radius: 24px; text-align: center;
    transform: scale(0.8); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1);
    width: 90%; max-width: 350px;
  }
  
  .success-overlay.active .success-modal { transform: scale(1); }

  .success-icon {
    width: 80px; height: 80px; background: #dcfce7; color: #10b981; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 40px;
    margin: 0 auto 20px auto;
  }

  .success-modal h3 { font-size: 22px; margin-bottom: 10px; }
  .success-modal p { color: var(--text-muted); font-size: 15px; margin-bottom: 25px; }

  .spinner {
    display: none;
    width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3);
    border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="header">
    <a href="studentdashboard.html" class="back-btn"><i class='bx bx-left-arrow-alt'></i></a>
    <h1>Pay Fee</h1>
  </div>

  <div class="content">
    <div class="due-card">
      <div class="label">Total Amount Due</div>
      <div class="amount"><span>₹</span><span id="dueText">0</span></div>
    </div>

    <div class="form-group">
      <label>Payment Method</label>
      <div class="input-wrapper">
        <i class='bx bx-credit-card'></i>
        <select class="form-control" id="method">
          <option value="upi">UPI / GPay / PhonePe</option>
          <option value="card">Debit / Credit Card</option>
          <option value="netbanking">Net Banking</option>
        </select>
        <i class='bx bx-chevron-down select-arrow'></i>
      </div>
    </div>

    <div class="form-group">
      <label>Enter Amount to Pay (₹)</label>
      <div class="input-wrapper">
        <i class='bx bx-rupee'></i>
        <input type="number" class="form-control" id="payAmount" placeholder="Ex: 5000">
      </div>
    </div>

    <p style="color:var(--text-muted); font-size: 13px; text-align: center; margin-bottom: 20px;">
      <i class='bx bx-lock-alt'></i> Secure Encrypted Payment Gateway
    </p>

    <button class="pay-btn" onclick="processPayment()" id="btnSubmit">
      <span>Proceed to Secure Payment</span>
      <div class="spinner" id="spinner"></div>
    </button>
  </div>

  <!-- Success Modal -->
  <div class="success-overlay" id="successScreen">
    <div class="success-modal">
      <div class="success-icon"><i class='bx bx-check'></i></div>
      <h3>Payment Successful!</h3>
      <p>Your college fee payment has been successfully recorded.</p>
    </div>
  </div>

  <script>
    // Load student data and show dues
    let student = JSON.parse(localStorage.getItem("studentData"));
    if(!student) { window.location.href = "index.html"; }

    let totalDue = (student.fee || 0) - (student.paid || 0);
    if(totalDue < 0) totalDue = 0;

    document.getElementById("dueText").innerText = totalDue.toLocaleString();
    document.getElementById("payAmount").value = totalDue; // Default to full amount

    function processPayment() {
      const amount = parseInt(document.getElementById("payAmount").value);
      if(isNaN(amount) || amount <= 0) { alert("Please enter a valid amount to pay."); return; }
      if(amount > totalDue && totalDue > 0) { alert("You cannot pay more than your due amount."); return; }

      // UI state transition
      const btn = document.getElementById("btnSubmit");
      const spinner = document.getElementById("spinner");
      btn.querySelector("span").innerText = "Processing...";
      spinner.style.display = "block";
      btn.style.opacity = "0.8";
      btn.disabled = true;

      // Simulate network request
      setTimeout(() => {
        // Update storage
        student.paid = (student.paid || 0) + amount;
        localStorage.setItem("studentData", JSON.stringify(student));

        // Show Success UI
        document.getElementById("successScreen").classList.add("active");
        
        // Return to dashboard
        setTimeout(() => {
           window.location.href = "studentdashboard.html";
        }, 2500);

      }, 1500);
    }
  </script>
</body>
</html>
